    <svg width="26" height="26" viewBox="0 0 26 26" aria-hidden="true"><path d="M6 4 L22 13 L6 22 Z" fill="#fffdf6" stroke="#26414a" stroke-width="3" stroke-linejoin="round"/></svg>
    Play
  </button>
  <div style="font-weight:500; font-size:16px; opacity:.55;">tap to start · no sound</div>
</div>
<script>
  (function () {
    var cover = document.getElementById("startCover");
    var btn = document.getElementById("startBtn");
    function deepFind(sel) {
      var out = [];
      (function walk(root) {
        root.querySelectorAll("*").forEach(function (el) {
          if (el.matches && el.matches(sel)) out.push(el);
          if (el.shadowRoot) walk(el.shadowRoot);
        });
      })(document);
      return out;
    }
    function start() {
      try { localStorage.setItem("cartoonmult:t", "0"); } catch (e) {}
      var reset = deepFind('button[title="Return to start (0)"]')[0];
      var play = deepFind('button[title="Play/pause (space)"]')[0];
      if (reset) reset.click();
      if (play) play.click();
      cover.style.opacity = "0";
      setTimeout(function () { cover.style.display = "none"; }, 360);
    }
    btn.addEventListener("click", start);
  })();
</script>
